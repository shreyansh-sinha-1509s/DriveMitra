<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Generator – DriveMitra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.jpeg" height="36" width="44" alt="DriveMitra Logo" style="border-radius:6px;">
    <span class="logo-name">DriveMitra</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="route.html">Route</a>
    <a href="feedback.html">Feedback</a>
    <a href="#" class="btn-nav-outline" id="authLink">Logout</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
      <span class="theme-icon-moon">🌙</span>
      <span class="theme-icon-sun">☀️</span>
    </button>
  </nav>
</header>

<div class="form-container">
  <h2>Generate Delivery Slip</h2>
  <input id="driverName" placeholder="Driver Name">
  <input id="vehicleNumber" placeholder="Vehicle Number">
  <input id="customerName" placeholder="Customer Name">
  <input id="itemType" placeholder="Item Delivered">
  <input id="quantity" placeholder="Quantity">
  <input id="location" placeholder="Delivery Location">
  <button onclick="generateSlip()">Generate Slip</button>
  <div id="slipResult"></div>
  <div id="qrCode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js" defer></script>

<footer>
  <div class="footer-inner">
    <div class="footer-top">
      <div>
        <div class="footer-brand">
          <img src="logo.jpeg" height="28" width="34" alt="logo">
          <strong>DriveMitra</strong>
        </div>
        <p class="footer-tagline">Simplifying local deliveries for tempo drivers.</p>
      </div>
      <div class="footer-col">
        <h4>Product</h4>
        <a href="slip.html">Slip Generator</a>

      </div>
      <div class="footer-col">
        <h4>Account</h4>
        <a href="login.html">Login</a>

      </div>
      <div class="footer-col">

      </div>

    <div class="footer-bottom">
      <span>© 2025 DriveMitra · Created by Shreyansh Sinha</span>
      <a href="index.html" class="footer-home-link">← Back to Home</a>
